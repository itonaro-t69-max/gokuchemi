<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>極・化学反応式 (GOKU-CHEMI) v3.2.2</title>
<style>
    /* 共通・ベース設定 */
    :root {
        --bg-dark: #0f111a; --bg-panel: #1a1d2d;
        --accent-cyan: #00e5ff; --accent-green: #00e676;
        --accent-red: #ff3d00; --accent-gold: #ffc400;
        --text-main: #f0f0f5; --text-sub: #a0a4b8;
    }
    body {
        margin: 0; padding: 0; padding-left: env(safe-area-inset-left); padding-right: env(safe-area-inset-right);
        background-color: var(--bg-dark); color: var(--text-main);
        font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
        display: flex; height: 100vh; height: 100dvh; overflow: hidden; touch-action: manipulation;
        -webkit-user-select: none; user-select: none; -webkit-user-drag: none;
        overscroll-behavior-y: none;
        -webkit-touch-callout: none;
    }
    body.modal-open { overflow: hidden; }
    
    /* モーダル共通 */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; }
    .modal-content { background: var(--bg-panel); border: 2px solid var(--accent-cyan); border-radius: 15px; padding: 25px 20px; max-width: 90%; width: 420px; box-shadow: 0 0 40px rgba(0,229,255,0.4); text-align: center; animation: popUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; flex-direction: column;}
    .modal-content h2 { color: var(--accent-cyan); margin-top: 0; font-size: 1.5rem; }
    .modal-content p { font-size: 1rem; line-height: 1.5; margin-bottom: 20px; }
    .tutorial-steps { text-align: left; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; margin-bottom: 20px; }
    .tutorial-steps li { margin-bottom: 10px; font-size: 0.95rem; line-height: 1.5; list-style-type: none; }
    .tutorial-steps li::before { content: '🧪'; margin-right: 8px; }
    .transfer-box { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 10px; margin-bottom: 15px; }
    .transfer-code { font-size: 2rem; font-weight: 900; color: var(--accent-gold); letter-spacing: 3px; user-select: all; -webkit-user-select: text;}
    .transfer-input { width: 80%; padding: 10px; font-size: 1.2rem; font-weight: bold; text-align: center; border-radius: 8px; border: 2px solid #4a4e69; background: #0f111a; color: #fff; text-transform: uppercase; margin-bottom: 10px; -webkit-user-select: text; user-select: text;}
    .transfer-input:focus { outline: none; border-color: var(--accent-cyan); }
    
    /* 苦手ノート専用デザイン */
    .note-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #2a2e45; border-radius: 8px; margin-bottom: 8px; font-weight: bold;}
    .delete-btn { background: var(--accent-red); color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.9rem; transition: 0.2s;}
    .delete-btn:active { transform: scale(0.9); }

    /* 図鑑専用デザイン */
    .dict-item { background: #1a1d2d; border-left: 4px solid var(--accent-cyan); border-radius: 8px; padding: 15px; margin-bottom: 15px; text-align: left;}
    .dict-item.hard { border-left-color: var(--accent-gold); }
    .dict-title { font-size: 1.1rem; font-weight: bold; color: #fff; margin-bottom: 10px; display: flex; align-items: center; gap: 8px;}
    .dict-eq { font-size: 1.3rem; font-weight: 900; color: #fff; margin-bottom: 10px; letter-spacing: 1px; background: rgba(0,0,0,0.4); padding: 12px 10px; border-radius: 6px; text-align: center; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch;}
    .dict-exp { font-size: 0.95rem; color: #d0d4e5; line-height: 1.6; }
    #dictionary-list::-webkit-scrollbar { width: 8px; }
    #dictionary-list::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 4px; }
    #dictionary-list::-webkit-scrollbar-thumb { background: #4a4e69; border-radius: 4px; }

    /* サイドバー */
    #sidebar { width: 280px; background-color: var(--bg-panel); border-right: 1px solid #2a2e45; display: flex; flex-direction: column; overflow-y: auto; box-shadow: 2px 0 15px rgba(0,0,0,0.5); z-index: 1000; flex-shrink: 0; transition: transform 0.3s ease; }
    .app-title { padding: 20px 15px 15px; font-size: 1.4rem; font-weight: 900; color: #fff; text-align: center; background: linear-gradient(135deg, #1a1d2d 0%, #0f111a 100%); letter-spacing: 2px; cursor: pointer;}
    .app-title span { display: block; font-size: 0.8rem; color: var(--accent-cyan); letter-spacing: 4px; margin-top: 5px; font-weight: bold; }
    .app-version { font-size: 0.7rem; color: #6a6f87; font-weight: normal; margin-top: 8px; letter-spacing: 1px; } 
    #status-area { background: rgba(0, 0, 0, 0.4); padding: 15px; text-align: center; border-bottom: 1px solid #2a2e45; }
    #rank-title { font-size: 0.9rem; color: var(--accent-gold); font-weight: bold; margin-bottom: 5px; }
    #point-display { font-size: 1.5rem; font-weight: 900; color: #fff; letter-spacing: 1px; }
    .pt-unit { font-size: 0.9rem; color: var(--text-sub); }
    .section-title { padding: 12px 15px; font-size: 0.85rem; color: var(--text-sub); background-color: #141724; border-top: 1px solid #2a2e45; border-bottom: 1px solid #2a2e45; font-weight: bold; }
    .section-title:first-of-type { border-top: none; }
    .menu-list { list-style: none; padding: 0; margin: 0; }
    .menu-item { padding: 14px 15px; border-bottom: 1px solid rgba(255,255,255,0.04); cursor: pointer; transition: 0.2s; font-size: 0.95rem; color: #d0d4e5; display: flex; align-items: center; gap: 8px;}
    @media (hover: hover) {
        .menu-item:hover { background-color: rgba(0, 229, 255, 0.1); color: var(--accent-cyan); }
        .menu-item.practice-btn:hover { background-color: rgba(255, 196, 0, 0.15); }
        .coeff-btn:hover { background: var(--accent-cyan); color: #000; transform: scale(1.05); }
    }
    .menu-item:active { background-color: rgba(0, 229, 255, 0.2); }
    .menu-item.active { background-color: rgba(0, 229, 255, 0.15); color: var(--accent-cyan); border-left: 4px solid var(--accent-cyan); font-weight: bold; }
    .menu-item.home-btn { color: var(--accent-cyan); font-weight: bold; background: rgba(0, 229, 255, 0.05); }
    .menu-item.practice-btn { color: var(--accent-gold); }
    .menu-item.sudden-death-btn { color: var(--accent-red); font-weight: bold;}
    .menu-item.sudden-death-btn:hover { background-color: rgba(255, 61, 0, 0.15); }
    .menu-item.review-btn { color: #ff5252; font-weight: bold; }
    .menu-item.review-btn:hover { background-color: rgba(255, 82, 82, 0.15); }
    .menu-item.note-btn { color: var(--text-main); background: rgba(255,255,255,0.02); }
    .menu-item.transfer-btn { color: var(--text-main); font-weight: bold; background: rgba(255,255,255,0.05); }

    /* モバイルヘッダー */
    #sidebar-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 900; opacity: 0; transition: opacity 0.3s; }
    #mobile-header { display: none; justify-content: space-between; align-items: center; padding: 10px 20px; background: #1a1d2d; border-bottom: 1px solid #2a2e45; z-index: 50; position: relative;}
    .mobile-title { font-size: 1.2rem; font-weight: 900; color: var(--accent-cyan); letter-spacing: 2px; cursor: pointer;}
    #menu-toggle-btn { background: var(--accent-cyan); color: #000; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; }

    /* ホーム画面 */
    #home-screen { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; height: 100%; width: 100%; position: absolute; top: 0; left: 0; z-index: 15; background: radial-gradient(circle at 50% 40%, #1a1d2d 0%, #08090d 80%); padding-top: 15vh; }
    .home-status-badge { position: absolute; top: 20px; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 30px; border: 1px solid var(--accent-gold); display: flex; gap: 15px; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 20;}
    .home-title { font-size: 3rem; font-weight: 900; color: #fff; text-shadow: 0 0 20px var(--accent-cyan), 0 4px 10px #000; margin-bottom: 5px; text-align: center; letter-spacing: 4px; z-index: 20;}
    .home-subtitle { font-size: 1.2rem; color: var(--accent-cyan); letter-spacing: 8px; margin-bottom: 40px; font-weight: bold; z-index: 20;}
    
    .magic-start-btn { width: 220px; height: 220px; border-radius: 50%; background: rgba(0, 229, 255, 0.05); border: 4px solid var(--accent-cyan); color: #fff; font-size: 2rem; font-weight: 900; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 0 40px rgba(0, 229, 255, 0.4), inset 0 0 30px rgba(0, 229, 255, 0.2); transition: 0.2s; animation: pulseGlow 2.5s infinite alternate; z-index: 20; -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px);}
    .magic-start-btn span { font-size: 1.2rem; color: var(--accent-cyan); margin-top: 8px; letter-spacing: 3px;}
    .magic-start-btn:active { transform: scale(0.95); box-shadow: 0 0 20px rgba(0, 229, 255, 0.8); }
    @keyframes pulseGlow { 0% { box-shadow: 0 0 30px rgba(0, 229, 255, 0.3), inset 0 0 20px rgba(0, 229, 255, 0.2); border-color: rgba(0, 229, 255, 0.5);} 100% { box-shadow: 0 0 60px rgba(0, 229, 255, 0.8), inset 0 0 50px rgba(0, 229, 255, 0.5); border-color: rgba(0, 229, 255, 1); } }

    .home-bottom-menu { display: flex; gap: 15px; margin-top: 40px; z-index: 20; flex-wrap: wrap; justify-content: center; margin-bottom: 120px; padding: 0 20px; width: 100%; box-sizing: border-box;}
    .home-action-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid #4a4e69; color: #d0d4e5; padding: 14px 24px; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px); flex: 1 1 auto; max-width: 250px;}
    .home-action-btn:hover { background: rgba(255, 255, 255, 0.1); border-color: var(--accent-gold); color: #fff; transform: translateY(-3px);}
    .home-action-btn.sudden-death { border-color: rgba(255, 61, 0, 0.5); color: #ff8a80;}
    .home-action-btn.sudden-death:hover { border-color: var(--accent-red); background: rgba(255, 61, 0, 0.15);}

    /* メインエリア・パーティクルコンテナ */
    #particle-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; overflow: hidden; }
    #main-content { flex: 1; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; overflow-x: hidden; position: relative; z-index: 5; padding-bottom: 180px; }
    
    #reaction-header { display: none; margin-bottom: 10px; justify-content: space-between; align-items: flex-end; flex-shrink: 0; position: relative; z-index: 20;}
    #reaction-title { font-size: 1.8rem; margin: 0 0 5px 0; font-weight: 800; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
    .instruction { color: var(--accent-cyan); font-size: 1.1rem; margin: 0; font-weight: bold; background: rgba(0, 229, 255, 0.15); display: inline-block; padding: 5px 15px; border-radius: 20px; -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px); }
    #practice-status { color: var(--accent-gold); font-size: 1.2rem; font-weight: bold; text-shadow: 0 0 8px rgba(255, 196, 0, 0.3), 0 2px 4px #000; }

    /* タイマーバー */
    #timer-container { display: none; width: 100%; max-width: 800px; height: 12px; background: #1a1d2d; border-radius: 6px; margin: 0 auto 15px auto; overflow: hidden; position: relative; z-index: 25; box-shadow: inset 0 2px 5px rgba(0,0,0,0.8); border: 2px solid #4a4e69;}
    #timer-bar { height: 100%; width: 100%; background: var(--accent-green); transition: width 0.1s linear, background-color 0.3s ease; }

    /* 学習エリア */
    #workspace-wrapper { display: none; width: 100%; background: #141724; border: 2px solid #2a2e45; border-radius: 12px; justify-content: flex-start; align-items: center; overflow-x: auto; overflow-y: hidden; -webkit-overflow-scrolling: touch; padding: 25px 15px; box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 10px 30px rgba(0,0,0,0.5); flex-shrink: 0; min-height: 250px; position: relative; z-index: 20; box-sizing: border-box;}
    #workspace-wrapper::-webkit-scrollbar { height: 8px; }
    #workspace-wrapper::-webkit-scrollbar-track { background: #1a1d2d; border-radius: 4px; }
    #workspace-wrapper::-webkit-scrollbar-thumb { background: #4a4e69; border-radius: 4px; }
    #workspace-wrapper::-webkit-scrollbar-thumb:hover { background: var(--accent-cyan); }

    #workspace { display: flex; align-items: stretch; justify-content: center; flex-wrap: nowrap; gap: 5px; min-width: max-content; margin: 0 auto;}
    
    .ws-col { display: flex; flex-direction: column; align-items: center; background: rgba(255,255,255,0.04); border-radius: 12px; padding: 10px; border: 2px solid transparent; transition: 0.3s; }
    .ws-col.error { border-color: var(--accent-red); background: rgba(255, 61, 0, 0.08); }
    .substance-name { font-size: 0.9rem; font-weight: bold; color: var(--text-main); background: #2a2e45; padding: 6px 12px; border-radius: 6px; white-space: nowrap; box-shadow: 0 2px 5px rgba(0,0,0,0.5); margin-bottom: 10px;}
    
    .ws-formula { height: 90px; display: flex; align-items: center; justify-content: center; width: 100%; }
    .ws-model { flex: 1; display: flex; flex-wrap: wrap; justify-content: center; align-items: flex-start; min-height: 50px; padding-top: 15px; gap: 4px; max-width: 140px; }

    .ws-op { display: flex; flex-direction: column; align-items: center; position: relative; padding: 10px 5px; }
    .ws-formula-op { height: 90px; display: flex; align-items: center; font-size: 2.8rem; font-weight: normal; color: #5a5e7a; text-shadow: 0 2px 5px #000; margin-top: 32px;}
    .ws-model-op { flex: 1; display: flex; align-items: flex-start; padding-top: 15px; font-size: 2.2rem; font-weight: normal; color: #5a5e7a; text-shadow: 0 2px 5px #000; }
    
    .ws-op.arrow .ws-formula-op, .ws-op.arrow .ws-model-op { color: var(--accent-cyan); text-shadow: 0 0 15px rgba(0, 229, 255, 0.4), 0 2px 5px #000; }
    .ws-divider { position: absolute; top: -10px; bottom: -10px; left: 50%; width: 2px; transform: translateX(-50%); background: repeating-linear-gradient(to bottom, var(--accent-cyan) 0, var(--accent-cyan) 8px, transparent 8px, transparent 16px); opacity: 0.6; z-index: -1; }

    .stage2-ui { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .coeff-controls { display: flex; gap: 15px; }
    .coeff-btn { width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--accent-cyan); background: rgba(0, 229, 255, 0.05); color: var(--accent-cyan); font-size: 1.8rem; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.1s; -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px);}
    .coeff-btn:active { background: var(--accent-cyan); color: #000; transform: scale(0.95); }
    .coeff-btn:disabled { opacity: 0.3 !important; cursor: not-allowed; border-color: #4a4e69; color: #4a4e69; pointer-events: none; }
    
    .formula-display { display: flex; align-items: baseline; position: relative; z-index: 100; } 
    .big-coeff { font-size: 3rem; font-weight: 900; color: var(--accent-gold); margin-right: 2px; line-height: 1; text-shadow: 0 2px 5px #000; }
    .hidden-coeff { color: rgba(255,255,255,0.1); text-shadow: none;}
    .chem-formula { font-size: 2.2rem; font-weight: bold; color: #fff; letter-spacing: 1px; text-shadow: 0 2px 5px #000; }

    select.formula-select { font-size: 1.6rem; padding: 10px 35px 10px 15px; background-color: #0f111a; font-weight: bold; color: #fff; border: 2px solid #4a4e69; border-radius: 8px; outline: none; cursor: pointer; -webkit-appearance: none; -moz-appearance: none; appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2300e5ff' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 10px center; background-size: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.6); position: relative; z-index: 100;}
    select.formula-select:focus { border-color: var(--accent-cyan); box-shadow: 0 0 10px rgba(0, 229, 255, 0.3); }

    /* 粒子モデル */
    .molecule-auto { display: flex; align-items: center; justify-content: center; flex-wrap: wrap; background: rgba(0,0,0,0.4); padding: 5px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); gap: 2px; }
    .molecule-auto.covalent { gap: 0; }
    .molecule-auto.covalent .atom { margin: -2px; } 
    .atom { width: 30px; height: 30px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 13px; flex-shrink: 0; box-shadow: inset -3px -3px 6px rgba(0,0,0,0.3), 0 2px 4px rgba(0,0,0,0.4); position: relative; z-index: 1; }
    .molecule-auto.covalent .atom { z-index: 2; }
    .molecule-auto.covalent .atom:nth-child(2) { z-index: 1; }
    .molecule-auto.covalent .atom:nth-child(3) { z-index: 0; }

    /* アクションエリア */
    #action-area { display: none; margin-top: 15px; flex-direction: column; align-items: center; gap: 10px; flex-shrink: 0; position: relative; z-index: 100;}
    .primary-btn { padding: 16px 60px; font-size: 1.4rem; font-weight: 900; color: #000; letter-spacing: 2px; background-color: var(--accent-cyan); border: none; border-radius: 40px; cursor: pointer; box-shadow: 0 6px 0 #009eb3, 0 10px 20px rgba(0,0,0,0.6); transition: 0.1s; width: fit-content; }
    .primary-btn:active { transform: translateY(6px); box-shadow: 0 0 0 #009eb3, 0 2px 5px rgba(0,0,0,0.4); }
    .primary-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none !important; }
    
    .primary-btn.next-btn { background-color: var(--accent-gold); box-shadow: 0 6px 0 #cc9d00; }
    .primary-btn.next-btn:active { box-shadow: 0 0 0 #cc9d00; }
    #feedback { font-size: 1.1rem; text-align: center; line-height: 1.4; font-weight: bold; width: 100%; min-height: 30px; }
    .feedback-error { color: var(--accent-red); background: rgba(255, 61, 0, 0.15); padding: 5px 20px; border-radius: 8px; display: inline-block; -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px); box-shadow: 0 4px 10px rgba(0,0,0,0.5);}
    
    #explanation-box { display: none; background: rgba(0, 230, 118, 0.15); border: 2px solid var(--accent-green); padding: 15px; padding-right: 140px; border-radius: 10px; margin-top: 10px; text-align: left; font-size: 1rem; line-height: 1.7; max-width: 800px; width: 100%; animation: popUp 0.5s ease-out forwards; box-sizing: border-box; -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px); box-shadow: 0 10px 20px rgba(0,0,0,0.5);}
    .exp-title { color: var(--accent-green); font-weight: 900; font-size: 1.1rem; margin-bottom: 5px; }

    .goku-clear-text { position: relative; z-index: 100; color: var(--accent-gold); font-size: 2rem; font-weight: 900; letter-spacing: 2px; text-shadow: 0 0 20px rgba(255, 196, 0, 0.8), 0 0 10px rgba(255, 255, 255, 0.5), 0 4px 10px #000; animation: popUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; background: rgba(0,0,0,0.6); padding: 10px 30px; border-radius: 20px; border: 2px solid var(--accent-gold);}
    
    @keyframes popUp { 0% { transform: scale(0.5); opacity: 0; } 50% { transform: scale(1.05); } 100% { transform: scale(1); opacity: 1; } }
    @keyframes successBorder { 0% { border-color: #2a2e45; box-shadow: inset 0 0 0 transparent; } 50% { border-color: var(--accent-gold); box-shadow: inset 0 0 50px rgba(255, 196, 0, 0.3); } 100% { border-color: #2a2e45; box-shadow: inset 0 0 10px rgba(255, 196, 0, 0.1); } }
    .glow-effect { animation: successBorder 1.5s ease-out; }
    
    .particle { position: absolute; pointer-events: none; z-index: 10; opacity: 0; }
    @keyframes fallRotate { 
        0% { transform: translateY(-50px) rotate(0deg) scale(0.5); opacity: 1; } 
        50% { opacity: 1; }
        100% { transform: translateY(110vh) rotate(var(--rot)) translateX(var(--tx)) scale(1.2); opacity: 0; } 
    }

    /* 人体模型ケン - 固定レイアウト */
    #ken-character { position: fixed; bottom: 10px; right: 10px; display: flex; flex-direction: column; align-items: center; z-index: 100; transition: transform 0.3s; transform: scale(0.75); transform-origin: bottom right; pointer-events: none;}
    .ken-bounce { animation: kenJump 0.4s ease; }
    @keyframes kenJump { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    #ken-speech { background: #fff; color: #000; padding: 10px 15px; border-radius: 12px; font-weight: bold; font-size: 1.1rem; margin-bottom: 12px; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.5); max-width: 250px; text-align: center; border: 2px solid #ccc; pointer-events: auto;}
    #ken-speech::after { content: ''; position: absolute; bottom: -12px; left: 50%; transform: translateX(-50%); border-width: 12px 12px 0; border-style: solid; border-color: #fff transparent transparent transparent; }
